<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question&aacute;rio de Seguran&ccedil;a - Meu Escudo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff8f6;
            --wine: #7d3441;
            --rose: #d98b93;
            --soft-rose: #fdf0f0;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(125, 52, 65, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0 0 110px;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--wine);
        }

        .header {
            padding: 32px 20px 18px;
            text-align: center;
        }

        h1 {
            margin: 0 0 10px;
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
        }

        .subtitle {
            margin: 0 auto;
            max-width: 520px;
            font-size: 0.95rem;
            line-height: 1.5;
            opacity: 0.8;
        }

        .container {
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .question-card {
            background: var(--white);
            margin-bottom: 18px;
            padding: 22px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(125, 52, 65, 0.06);
        }

        .question-title {
            margin: 0 0 14px;
            font-size: 1rem;
            line-height: 1.4;
        }

        .option {
            display: block;
            margin-top: 10px;
            padding: 13px 14px;
            background: var(--soft-rose);
            border: 1px solid transparent;
            border-radius: 18px;
            cursor: pointer;
        }

        .option input {
            margin-right: 8px;
            accent-color: var(--wine);
        }

        .option:has(input:checked) {
            background: #f8dfe3;
            border-color: var(--rose);
            font-weight: 600;
        }

        .finish-card {
            background: var(--white);
            padding: 22px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .btn-finish {
            width: 100%;
            max-width: 320px;
            background: var(--wine);
            color: white;
            border: none;
            padding: 14px 22px;
            border-radius: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        .message {
            display: none;
            margin-top: 16px;
            padding: 14px;
            border-radius: 18px;
            line-height: 1.5;
        }

        .message.error {
            display: block;
            background: #fff1d6;
            color: #7d3441;
        }

        .message.success {
            display: block;
            background: #e8f5e9;
            color: #2e7d32;
        }

        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 15px;
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .nav-item {
            color: var(--wine);
            font-size: 0.95rem;
            font-weight: bold;
            text-decoration: none;
        }

        @media (max-width: 520px) {
            h1 {
                font-size: 1.7rem;
            }

            .question-card {
                padding: 18px;
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>Question&aacute;rio de Seguran&ccedil;a</h1>
        <p class="subtitle">Responda com calma. Este question&aacute;rio &eacute; apenas uma reflex&atilde;o inicial e n&atilde;o substitui ajuda profissional.</p>
    </header>

    <main class="container">
        <form id="formQuestionario">
            <div id="listaPerguntas"></div>

            <div class="finish-card">
                <button class="btn-finish" type="submit">Finalizar question&aacute;rio</button>
                <div id="mensagemFinal" class="message"></div>
            </div>
        </form>
    </main>

    <nav class="bottom-nav">
        <a href="/home-secret" class="nav-item">In&iacute;cio</a>
        <a href="/localizacao" class="nav-item">SOS</a>
        <a href="/contatos" class="nav-item">Contatos</a>
        <a href="/diario" class="nav-item">Di&aacute;rio</a>
    </nav>

    <script>
        // Array com as perguntas para evitar repetir muito HTML.
        const perguntas = [
            {
                texto: 'Com que frequ&ecirc;ncia voc&ecirc; se sente insegura em casa?',
                opcoes: ['Nunca', 'Raramente', '&Agrave;s vezes', 'Frequentemente']
            },
            {
                texto: 'Seu parceiro(a) controla seu dinheiro ou bens?',
                opcoes: ['N&atilde;o', 'Um pouco', 'Sim, bastante', 'Controle total']
            },
            {
                texto: 'Voc&ecirc; j&aacute; foi impedida de ver familiares ou amigos?',
                opcoes: ['Nunca', 'Poucas vezes', 'Com frequ&ecirc;ncia', 'Sou totalmente isolada']
            },
            {
                texto: 'J&aacute; sofreu amea&ccedil;as verbais ou f&iacute;sicas?',
                opcoes: ['Nunca', 'Verbais leves', 'Verbais graves', 'F&iacute;sicas']
            },
            {
                texto: 'Voc&ecirc; tem acesso a documentos pessoais (RG, CPF, certid&otilde;es)?',
                opcoes: ['Sim, todos comigo', 'Alguns est&atilde;o com outra pessoa', 'N&atilde;o tenho acesso']
            },
            {
                texto: 'Voc&ecirc; sente medo de contrariar seu parceiro(a)?',
                opcoes: ['N&atilde;o', '&Agrave;s vezes', 'Sim, sempre']
            }
        ];

        // Objeto simples para guardar as respostas escolhidas.
        const respostas = {};

        const listaPerguntas = document.getElementById('listaPerguntas');
        const formQuestionario = document.getElementById('formQuestionario');
        const mensagemFinal = document.getElementById('mensagemFinal');

        function mostrarPerguntas() {
            perguntas.forEach((pergunta, indice) => {
                const numeroPergunta = indice + 1;
                const card = document.createElement('section');
                card.className = 'question-card';

                let opcoesHtml = '';
                pergunta.opcoes.forEach((opcao) => {
                    opcoesHtml += `
                        <label class="option">
                            <input type="radio" name="pergunta${numeroPergunta}" value="${opcao}">
                            ${opcao}
                        </label>
                    `;
                });

                card.innerHTML = `
                    <h2 class="question-title">Pergunta ${numeroPergunta}: ${pergunta.texto}</h2>
                    ${opcoesHtml}
                `;

                listaPerguntas.appendChild(card);
            });
        }

        function salvarResposta(evento) {
            const campo = evento.target;

            if (campo.type === 'radio') {
                respostas[campo.name] = campo.value;
            }
        }

        function finalizarQuestionario(evento) {
            evento.preventDefault();

            if (Object.keys(respostas).length < perguntas.length) {
                mensagemFinal.className = 'message error';
                mensagemFinal.innerHTML = 'Responda todas as perguntas antes de finalizar.';
                return;
            }

            mensagemFinal.className = 'message success';
            mensagemFinal.innerHTML = 'Question&aacute;rio finalizado. Obrigada por responder. Suas respostas ajudam a refletir sobre sua seguran&ccedil;a.';
        }

        mostrarPerguntas();
        listaPerguntas.addEventListener('change', salvarResposta);
        formQuestionario.addEventListener('submit', finalizarQuestionario);
    </script>
</body>
</html>
