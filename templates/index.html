<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Maquiagem</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-main: #fff9f9;
      --bg-secondary: #fdf2f2;
      --accent-soft: #f8e1e1;
      --accent-deep: #8c4b55;
      --text-main: #2d2424;
      --text-muted: #7a6a6a;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-main);
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
    }

    /* HEADER */
    header {
      position: sticky;
      top: 0;
      background: rgba(255, 249, 249, 0.9);
      backdrop-filter: blur(10px);
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--accent-deep);
      cursor: pointer;
    }

    /* HERO */
    .hero {
      padding: 40px 24px;
    }

    .hero-tag {
      background: var(--accent-soft);
      color: var(--accent-deep);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      display: inline-block;
      margin-bottom: 12px;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      margin-bottom: 14px;
    }

    .hero-title span {
      color: var(--accent-deep);
      font-style: italic;
    }

    .hero-desc {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* CARD */
    .featured-card {
      margin: 0 24px 30px;
      background: linear-gradient(135deg, #f8a6b1, #f0e1c7);
      padding: 30px;
      border-radius: 24px;
    }

    /* =============================================
       NOVA CATEGORIA (SEPHORA STYLE)
    ============================================= */

    .categories {
      padding: 30px 0;
      background: white;
      margin-bottom: 30px;
    }

    .category-menu {
      display: flex;
      gap: 30px;
      overflow-x: auto;
      padding: 0 24px;
    }

    .category-menu::-webkit-scrollbar {
      display: none;
    }

    .category-item {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text-main);
    }

    .category-icon {
      width: 70px;
      height: 70px;
      background: black;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      text-align: center;
    }

    .category-icon.red {
      background: #ec0033;
      font-size: 0.8rem;
    }

    .category-text strong {
      font-size: 0.9rem;
    }

    .category-text span {
      font-size: 0.8rem;
    }

    .category-arrow {
      font-size: 1.8rem;
    }

    /* PRODUTOS */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      padding: 0 24px 40px;
    }

    .product-card {
      background: white;
      padding: 12px;
      border-radius: 16px;
    }

    .product-image {
      height: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2rem;
    }

    .product-name {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .product-brand {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .product-price {
      color: var(--accent-deep);
      font-weight: bold;
    }

    /* NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: white;
      padding: 12px;
    }

    .product-img {
  width: 100%;
  max-width: 300px;
  border-radius: 12px;
    }

    .nav-item {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.7rem;
      text-align: center;
    }

    .nav-item.active {
      color: var(--accent-deep);
    }

    /* TOAST */
    .toast {
      position: fixed;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: black;
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      opacity: 0;
    }

    .toast.show {
      opacity: 1;
    }
  </style>
</head>

<body>

<header>
  <div class="logo" id="secretTrigger">Minha Maquiagem</div>
</header>

<section class="hero">
  <span class="hero-tag">Coleção 2026</span>
  <h1 class="hero-title">Realce sua <span>beleza</span></h1>
  <p class="hero-desc">Descubra sua melhor versão</p>
</section>


<!-- NOVA CATEGORIA -->
<section class="categories">
  <div class="category-menu">

    <a href="#" class="category-item">
      <div class="category-icon red">OFERTAS</div>
      <div class="category-text">
        <strong>OFERTAS</strong>
        <span>ATÉ 60%</span>
      </div>
      <span class="category-arrow">›</span>
    </a>

    <a href="#" class="category-item">
      <div class="category-icon">✦</div>
      <div class="category-text">
        <strong>NOVIDADES</strong>
      </div>
      <span class="category-arrow">›</span>
    </a>

    <a href="#" class="category-item">
      <div class="category-icon">💄</div>
      <div class="category-text">
        <strong>MAKE</strong>
      </div>
      <span class="category-arrow">›</span>
    </a>

    <a href="#" class="category-item">
      <div class="category-icon">🧴</div>
      <div class="category-text">
        <strong>SKINCARE</strong>
      </div>
      <span class="category-arrow">›</span>
    </a>

  </div>
</section>

<section class="product-grid">
  <div class="product-card">
    <div class="product-image">💄</div>
    <div class="product-name">Batom</div>
    <div class="product-brand">Marca X</div>
    <div class="product-price">R$ 89</div>
  </div>

  <div class="product-card">
    <div class="product-image">✨</div>
    <div class="product-name">Iluminador</div>
    <div class="product-brand">Marca Y</div>
    <div class="product-price">R$ 120</div>
  </div>
</section>

<nav class="bottom-nav">
  <a href="#" class="nav-item active">Início</a>
  <a href="#" class="nav-item">Favoritos</a>
  <a href="/login" class="nav-item">Perfil</a>
</nav>

<div id="toast" class="toast">Acessando área privada...</div>

<script>
const logo = document.getElementById('secretTrigger');
const toast = document.getElementById('toast');

let clicks = 0;

logo.addEventListener('click', () => {
  clicks++;

  if (clicks >= 3) {
    toast.classList.add('show');
  }

  if (clicks === 5) {
    alert('Área privada!');
    clicks = 0;
  }
});
</script>

</body>
</html>
