<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Maquiagem</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-main: #fff9f9;
      --accent-soft: #f8e1e1;
      --accent-deep: #8c4b55;
      --text-main: #2d2424;
      --text-muted: #7a6a6a;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-main);
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 30px;
      background: rgba(255, 249, 249, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #f0dddd;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--accent-deep);
      cursor: pointer;
    }

    .logo img {
      height: 48px;
      width: auto;
    }

    .menu {
      display: flex;
      gap: 28px;
    }

    .menu a {
      text-decoration: none;
      color: #7a4b4b;
      font-weight: 500;
      transition: 0.2s;
    }

    .menu a:hover {
      color: var(--accent-deep);
    }

    .hero {
      padding: 42px 24px 20px;
    }

    .hero-tag {
      background: var(--accent-soft);
      color: var(--accent-deep);
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 0.75rem;
      display: inline-block;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.7rem;
      margin-bottom: 10px;
    }

    .hero-title span {
      color: var(--accent-deep);
      font-style: italic;
    }

    .hero-desc {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .image-frame {
      width: 95%;
      height: 200px;
      margin: 20px auto 32px;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(140, 75, 85, 0.18);
    }

    .image-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .categories {
      padding: 24px;
      background: var(--white);
      margin-bottom: 30px;
    }

    .category-menu {
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
    }

    .category-item {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text-main);
      background: #fff7f7;
      padding: 12px 18px;
      border-radius: 999px;
      box-shadow: 0 8px 20px rgba(140, 75, 85, 0.08);
      transition: 0.25s;
    }

    .category-item:hover {
      transform: translateY(-4px);
      background: var(--accent-soft);
    }

    .category-icon {
      width: 45px;
      height: 45px;
      background: var(--accent-deep);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .category-text strong {
      font-size: 0.85rem;
    }

    .category-arrow {
      font-size: 1.5rem;
      color: var(--accent-deep);
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 22px;
    }

    .product-card {
      background: var(--white);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(140, 75, 85, 0.12);
      transition: 0.3s;
      cursor: pointer;
      border: 1px solid #f3e1e1;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 18px 40px rgba(140, 75, 85, 0.2);
    }

    .product-image {
      height: 190px;
      background: linear-gradient(135deg, #fff0f2, #f8e1e1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .product-image img {
      max-width: 80%;
      max-height: 150px;
      object-fit: contain;
      display: block;
    }

    .product-image.emoji {
      font-size: 3rem;
    }

    .product-info {
      padding: 16px;
    }

    .product-name {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .product-brand {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .product-price {
      color: var(--accent-deep);
      font-weight: 800;
      font-size: 1.1rem;
    }

    .toast {
      position: fixed;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #2d2424;
      color: white;
      padding: 10px 20px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
    }

    .toast.show {
      opacity: 1;
    }
  </style>
</head>

<body>

<header class="navbar">
  <div class="logo" id="secretTrigger">
    <img src="static/imagens/logo.png" alt="Logo">
    <span>Minha Maquiagem</span>
  </div>

  <nav class="menu">
    <a href="/index">Início</a>
    <a href="#">Favoritos</a>
    <a href="/login">Perfil</a>
  </nav>
</header>

<section class="hero">
  <span class="hero-tag">Coleção 2026</span>
  <h1 class="hero-title">Realce sua <span>beleza</span></h1>
  <p class="hero-desc">Descubra sua melhor versão</p>
</section>

<div class="image-frame">
  <img src="static/imagens/index-img.png" alt="Imagem principal">
</div>

<section class="categories">
  <div class="category-menu">
    <a href="/novidades" class="category-item">
      <div class="category-icon">✦</div>
      <div class="category-text"><strong>NOVIDADES</strong></div>
      <span class="category-arrow">›</span>
    </a>

    <a href="/make" class="category-item">
      <div class="category-icon">💄</div>
      <div class="category-text"><strong>MAKE</strong></div>
      <span class="category-arrow">›</span>
    </a>

    <a href="/skincare" class="category-item">
      <div class="category-icon">🧴</div>
      <div class="category-text"><strong>SKINCARE</strong></div>
      <span class="category-arrow">›</span>
    </a>
  </div>
</section>

<section class="product-grid">
  <div class="product-card">
    <div class="product-image">
      <img src="static/imagens/batom.png" alt="Batom">
    </div>
    <div class="product-info">
      <div class="product-name">Batom</div>
      <div class="product-brand">Marca X</div>
      <div class="product-price">R$ 89</div>
    </div>
  </div>

  <div class="product-card">
    <div class="product-image emoji">✨</div>
    <div class="product-info">
      <div class="product-name">Iluminador</div>
      <div class="product-brand">Marca Y</div>
      <div class="product-price">R$ 120</div>
    </div>
  </div>

  <div class="product-card">
    <div class="product-image">
      <img src="static/imagens/batom.png" alt="Batom">
    </div>
    <div class="product-info">
      <div class="product-name">Batom</div>
      <div class="product-brand">Marca X</div>
      <div class="product-price">R$ 89</div>
    </div>
  </div>

  <div class="product-card">
    <div class="product-image">
      <img src="static/imagens/batom.png" alt="Batom">
    </div>
    <div class="product-info">
      <div class="product-name">Batom</div>
      <div class="product-brand">Marca X</div>
      <div class="product-price">R$ 89</div>
    </div>
  </div> 
  
  <div class="product-card">
    <div class="product-image">
      <img src="static/imagens/batom.png" alt="Batom">
    </div>
    <div class="product-info">
      <div class="product-name">Batom</div>
      <div class="product-brand">Marca X</div>
      <div class="product-price">R$ 89</div>
    </div>
  </div> 
</section>

<div id="toast" class="toast">Acessando área privada...</div>

<script>
  const logo = document.getElementById('secretTrigger');
  const toast = document.getElementById('toast');

  let clicks = 0;

  logo.addEventListener('click', () => {
    clicks++;

    if (clicks >= 3) {
      toast.classList.add('show');
    }

    if (clicks === 5) {
      alert('Área privada!');
      clicks = 0;
      toast.classList.remove('show');
    }
  });
</script>

</body>
</html>
