<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make - Minha Maquiagem</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-main: #fff9f9;
      --accent-soft: #f8e1e1;
      --accent-deep: #8c4b55;
      --text-main: #2d2424;
      --text-muted: #7a6a6a;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-main);
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 30px;
      background: rgba(255, 249, 249, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #f0dddd;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--accent-deep);
    }

    .logo img {
      height: 48px;
      width: auto;
    }

    .menu {
      display: flex;
      gap: 28px;
    }

    .menu a {
      text-decoration: none;
      color: #7a4b4b;
    }

    .menu a:hover {
      color: var(--accent-deep);
    }

    .page-header {
      padding: 42px 30px 28px;
    }

    .page-tag {
      background: var(--accent-soft);
      color: var(--accent-deep);
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      display: inline-block;
      margin-bottom: 12px;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      margin-bottom: 8px;
    }

    .page-header p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 22px;
      padding: 0 30px 50px;
    }

    .product-card {
      background: var(--white);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(140, 75, 85, 0.12);
      transition: 0.3s;
      cursor: pointer;
      border: 1px solid #f3e1e1;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 18px 40px rgba(140, 75, 85, 0.2);
    }

    .product-image {
      height: 190px;
      background: linear-gradient(135deg, #fff0f2, #f8e1e1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .product-image img {
      max-width: 80%;
      max-height: 150px;
      object-fit: contain;
      display: block;
    }

    .product-image.emoji {
      font-size: 3rem;
    }

    .product-info {
      padding: 16px;
    }

    .product-name {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .product-brand {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .product-price {
      color: var(--accent-deep);
      font-weight: 800;
      font-size: 1.1rem;
    }

    .page-top {
      padding: 40px 32px 0;
    }

    .back-btn {
      color: var(--on-surface-soft);
      text-decoration: none;
      font-size: 0.95rem;
    }

    .product-card {
  position: relative;
  background: var(--white);
  border-radius: 22px;
  overflow: hidden;
  box-shadow: 0 10px 28px rgba(140, 75, 85, 0.12);
  transition: 0.3s;
  cursor: pointer;
  border: 1px solid #f3e1e1;
}

.favorite-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 2;

  width: 38px;
  height: 38px;

  border: none;
  border-radius: 50%;

  background: white;
  color: var(--accent-deep);

  font-size: 20px;
  cursor: pointer;

  box-shadow: 0 6px 15px rgba(0,0,0,0.15);
  transition: 0.3s;
}

.favorite-btn:hover {
  transform: scale(1.1);
}

.favorite-btn.active {
  background: var(--accent-deep);
  color: white;
}
  </style>
</head>

<body>

<header class="navbar">
  <div class="logo" id="secretTrigger">
    <a href="/">
      <img src="static/imagens/logo.png" alt="Logo" >
    </a>
    <span>Minha Maquiagem</span>
  </div>

  <nav class="menu">
    <a href="/">Início</a>
    <a href="/favoritos">Favoritos</a>
    <a href="/login">Perfil</a>
  </nav>
</header>

<div class="page-top">
    <a href="/" class="back-btn">← Voltar para loja</a>
</div>

<section class="page-header">
  <span class="page-tag">Categoria</span>
  <h1>💄 Makes</h1>
  <p>Produtos de maquiagem para realçar sua beleza todos os dias.</p>
</section>

<section class="product-grid">

  <div class="product-card">
    <button class="favorite-btn" onclick="toggleFavorito(this, {
      nome: 'Batom Matte',
      marca: 'Marca X',
      preco: 'R$ 89',
      imagem: '💄'
    })">♡</button>

    <div class="product-image">
      <img src="{{ url_for('static', filename='imagens/3346470623880.avif') }}" alt="Batom">
    
    </div>
    <div class="product-info">
      <div class="product-name">Batom Matte</div>
      <div class="product-brand">Marca X</div>
      <div class="product-price">R$ 89</div>
    </div>
  </div>

  <div class="product-card">
    <button class="favorite-btn" onclick="toggleFavorito(this, {
      nome: 'Iluminador Glow',
      marca: 'Marca Y',
      preco: 'R$ 120',
      imagem: '✨'
    })">♡</button>

    <div class="product-image emoji">✨</div>
    
    <div class="product-info">
      <div class="product-name">Iluminador Glow</div>
      <div class="product-brand">Marca Y</div>
      <div class="product-price">R$ 120</div>
    </div>
  </div>

  <div class="product-card">
    <button class="favorite-btn" onclick="toggleFavorito(this, {
      nome: 'Paleta de Sombras',
      marca: 'Marca Z',
      preco: 'R$ 149',
      imagem: '🎨'
    })">♡</button>

    <div class="product-image emoji">🎨</div>
    
    <div class="product-info">
      <div class="product-name">Paleta de Sombras</div>
      <div class="product-brand">Marca Z</div>
      <div class="product-price">R$ 149</div>
    </div>
  </div>

  <div class="product-card">
    <button class="favorite-btn" 
    onclick="toggleFavorito(this, {
      nome: 'Base Líquida',
      marca: 'Marca Beauty',
      preco: 'R$ 99',
      imagem: '🖌️'
    })">♡</button>
    
    <div class="product-image emoji">🖌️</div>
    
    <div class="product-info">
      <div class="product-name">Base Líquida</div>
      <div class="product-brand">Marca Beauty</div>
      <div class="product-price">R$ 99</div>
    </div>
  </div>

</section>

<script>
function toggleFavorito(btn, produto) {
  let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];

  const existe = favoritos.find(p => p.nome === produto.nome);

  if (existe) {
    favoritos = favoritos.filter(p => p.nome !== produto.nome);
    btn.classList.remove("active");
    btn.innerHTML = "♡";
  } else {
    favoritos.push(produto);
    btn.classList.add("active");
    btn.innerHTML = "❤️";
  }

  localStorage.setItem("favoritos", JSON.stringify(favoritos));
}

function marcarFavoritosAtivos() {
  const favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];
  const botoes = document.querySelectorAll(".favorite-btn");

  botoes.forEach(btn => {
    const onclick = btn.getAttribute("onclick");

    favoritos.forEach(produto => {
      if (onclick.includes(produto.nome)) {
        btn.classList.add("active");
        btn.innerHTML = "❤️";
      }
    });
  });
}

marcarFavoritosAtivos();
</script>

</body>
</html>
