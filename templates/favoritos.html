<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favoritos - Minha Maquiagem</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-main: #fff9f9;
      --accent-soft: #f8e1e1;
      --accent-deep: #8c4b55;
      --text-main: #2d2424;
      --text-muted: #7a6a6a;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg-main);
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 30px;
      background: rgba(255, 249, 249, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #f0dddd;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--accent-deep);
    }

    .logo img {
      height: 48px;
      width: auto;
    }

    .menu {
      display: flex;
      gap: 28px;
    }

    .menu a {
      text-decoration: none;
      color: #7a4b4b;
      font-weight: 500;
    }

    .menu a:hover,
    .menu a.active {
      color: var(--accent-deep);
      font-weight: 700;
    }

    .page-header {
      padding: 42px 30px 28px;
    }

    .page-tag {
      background: var(--accent-soft);
      color: var(--accent-deep);
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      display: inline-block;
      margin-bottom: 12px;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      margin-bottom: 8px;
    }

    .page-header p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .favorites-box {
      margin: 0 30px 28px;
      padding: 22px;
      background: linear-gradient(135deg, #fff0f2, #f8e1e1);
      border-radius: 24px;
      box-shadow: 0 10px 28px rgba(140, 75, 85, 0.12);
    }

    .favorites-box h2 {
      font-family: 'Playfair Display', serif;
      color: var(--accent-deep);
      margin-bottom: 8px;
    }

    .favorites-box p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 22px;
      padding: 0 30px 50px;
    }

    .product-card {
      position: relative;
      background: var(--white);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(140, 75, 85, 0.12);
      transition: 0.3s;
      cursor: pointer;
      border: 1px solid #f3e1e1;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 18px 40px rgba(140, 75, 85, 0.2);
    }

    .favorite-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 50%;
      background: white;
      color: var(--accent-deep);
      font-size: 1.2rem;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      cursor: pointer;
    }

    .product-image {
      height: 190px;
      background: linear-gradient(135deg, #fff0f2, #f8e1e1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .product-image img {
      max-width: 80%;
      max-height: 150px;
      object-fit: contain;
      display: block;
    }

    .product-image.emoji {
      font-size: 3rem;
    }

    .product-info {
      padding: 16px;
    }

    .product-name {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .product-brand {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .product-price {
      color: var(--accent-deep);
      font-weight: 800;
      font-size: 1.1rem;
    }

    .page-top {
      padding: 40px 32px 0;
    }

    .back-btn {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.95rem;
}

.favorite-btn.active {
  background: var(--accent-deep);
  color: white;
}

.empty-favorites {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
}

.empty-favorites h2 {
  font-family: 'Playfair Display', serif;
  color: var(--accent-deep);
  margin-bottom: 10px;
}

.empty-favorites p {
  color: var(--text-muted);
  margin-bottom: 20px;
}

.btn-voltar {
  display: inline-block;
  padding: 10px 20px;
  background: var(--accent-deep);
  color: white;
  border-radius: 20px;
  text-decoration: none;
  font-size: 0.9rem;
}

.empty-favorites {
  opacity: 0.8;
}
  </style>
</head>

<body>

<header class="navbar">
  <div class="logo">
    <img src="/static/imagens/logo.png" alt="Logo">
    <span>Minha Maquiagem</span>
  </div>

  <nav class="menu">
    <a href="/">Início</a>
    <a href="/favoritos" class="active">Favoritos</a>
    <a href="/login">Perfil</a>
  </nav>
</header>

<div class="page-top">
    <a href="/" class="back-btn">← Voltar para loja</a>
</div>

<section class="page-header">
  <span class="page-tag">Meus produtos</span>
  <h1>❤️ Favoritos</h1>
  <p>Produtos que você salvou para ver depois.</p>
</section>

<section class="favorites-box">
  <h2>Sua seleção especial</h2>
  <p>Aqui ficam os produtos favoritos escolhidos por você.</p>
</section>


<section class="product-grid" id="favoritos-container">
</section>

<script>
function carregarFavoritos() {
  const container = document.getElementById("favoritos-container");
  const favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];

if (favoritos.length === 0) {
  container.innerHTML = `
    <div class="empty-favorites">
      <h2>😢 Nenhum favorito ainda</h2>
      <p>Você ainda não adicionou produtos aos favoritos.</p>
      <a href="/" class="btn-voltar">Explorar produtos</a>
    </div>
  `;
  return;
}

  favoritos.forEach(produto => {
    container.innerHTML += `
      <div class="product-card">
        <button class="favorite-btn active" onclick="removerFavorito('${produto.nome}')">❤️</button>

        <div class="product-image emoji">${produto.imagem}</div>

        <div class="product-info">
          <div class="product-name">${produto.nome}</div>
          <div class="product-brand">${produto.marca}</div>
          <div class="product-price">${produto.preco}</div>
        </div>
      </div>
    `;
  });
}

function removerFavorito(nome) {
  let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];

  favoritos = favoritos.filter(produto => produto.nome !== nome);

  localStorage.setItem("favoritos", JSON.stringify(favoritos));

  carregarFavoritos();
}

carregarFavoritos();
</script>

</body>
</html>
