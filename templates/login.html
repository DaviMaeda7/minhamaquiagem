<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área Privada</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --surface: #fff8f8;
      --surface-low: #f7ecec;
      --surface-container: #f2e4e4;
      --surface-high: #edd6d6;
      --primary: #8c4b55;
      --primary-container: #f8a6b1;
      --on-surface: #1d1b1b;
      --on-surface-soft: #6b5b5b;
      --error: #ba1a1a;
      --white: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      font-family: 'Inter', sans-serif;
      color: var(--on-surface);
    }

    .page-top {
      padding: 40px 32px 0;
    }

    .back-btn {
      color: var(--on-surface-soft);
      text-decoration: none;
      font-size: 0.82rem;
    }

    .login-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 32px;
    }

    .shield-icon {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      line-height: 1.15;
      margin-bottom: 8px;
    }

    .login-title em {
      color: var(--primary);
      font-style: italic;
    }

    .login-sub {
      color: var(--on-surface-soft);
      font-size: 0.92rem;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--on-surface-soft);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .input-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-bottom: 2px solid transparent;
      border-radius: 8px 8px 0 0;
      background: var(--surface-container);
      font-size: 0.95rem;
      outline: none;
    }

    .form-input:focus {
      background: var(--surface-high);
      border-bottom-color: var(--primary);
    }

    .input-icon {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 1.1rem;
    }

    .form-error {
      display: none;
      margin-top: 6px;
      color: var(--error);
      font-size: 0.8rem;
    }

    .form-error.show {
      display: block;
    }

    .pin-option {
      margin: 8px 0 28px;
      text-align: center;
      color: var(--on-surface-soft);
      font-size: 0.82rem;
    }

    .pin-option a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .btn-primary,
    .btn-secondary {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 30px;
      font-size: 0.94rem;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-container));
      color: var(--white);
      font-weight: 500;
    }

    .btn-secondary {
      margin-top: 12px;
      background: rgba(140, 75, 85, 0.08);
      color: var(--primary);
      font-weight: 500;
    }

    .login-footer {
      padding: 0 32px 40px;
      text-align: center;
    }

    .footer-text {
      color: var(--on-surface-soft);
      font-size: 0.75rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="page-top">
    <a href="/" class="back-btn">← Voltar para loja</a>
  </div>

  <main class="login-wrapper">
    <span class="shield-icon">🛡️</span>

    <h1 class="login-title">
      Área <br>
      <em>privada.</em>
    </h1>

    <p class="login-sub">
      Apenas você sabe que isto existe.<br>
      Entre com segurança.
    </p>

    <div class="form-group">
      <label for="inputUsuario" class="form-label">Seu e-mail</label>
      <input
        type="text"
        id="inputUsuario"
        class="form-input"
        placeholder="Digite seu e-mail"
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <div class="form-group">
      <label for="inputSenha" class="form-label">Senha</label>
      <div class="input-wrapper">
        <input
          type="password"
          id="inputSenha"
          class="form-input"
          placeholder="••••••••"
        >
        <span class="input-icon" id="toggleSenha">👁️</span>
      </div>
      <p class="form-error" id="erroSenha">Algo precisa de atenção — verifique suas informações.</p>
    </div>

    <button class="btn-primary" id="btnEntrar">Entrar com segurança →</button>
    <button class="btn-secondary" onclick="window.location.href='/cadastro'">
    Criar minha conta segura
    </button>
  </main>

  <footer class="login-footer">
    <p class="footer-text">
      Suas informações são guardadas com carinho.<br>
      Ninguém além de você tem acesso.
    </p>
  </footer>

  <script>
const toggleSenha = document.getElementById('toggleSenha');
const inputSenha = document.getElementById('inputSenha');
const inputUsuario = document.getElementById('inputUsuario');
const btnEntrar = document.getElementById('btnEntrar');
const erroSenha = document.getElementById('erroSenha');

// mostrar senha
toggleSenha.addEventListener('click', () => {

  if (inputSenha.type === 'password') {
    inputSenha.type = 'text';
    toggleSenha.textContent = '🙈';
  } else {
    inputSenha.type = 'password';
    toggleSenha.textContent = '👁️';
  }

});

// login
async function fazerLogin() {

  console.log('BOTÃO CLICADO');

  const usuario = inputUsuario.value.trim();
  const senha = inputSenha.value.trim();

  console.log('EMAIL:', usuario);
  console.log('SENHA:', senha);

  erroSenha.classList.remove('show');

  // validação
  if (!usuario || !senha) {

    console.log('CAMPOS VAZIOS');

    erroSenha.textContent = 'Preencha todos os campos.';
    erroSenha.classList.add('show');

    return;
  }

  try {

    console.log('ENVIANDO REQUEST');

    const resposta = await fetch('https://minhamaquiagem-production.up.railway.app/api/login', {

      method: 'POST',

      headers: {
        'Content-Type': 'application/json'
      },

      body: JSON.stringify({
        email: usuario,
        password: senha
      })

    });

    console.log('STATUS:', resposta.status);

    const data = await resposta.json();

    console.log('RESPOSTA:', data);

    if (data.success) {

      btnEntrar.textContent = 'Entrando... ✨';

      setTimeout(() => {
        window.location.href = '/home-secret';
      }, 1000);

    } else {

      erroSenha.textContent = data.message || 'Login inválido';
      erroSenha.classList.add('show');

      inputSenha.value = '';
      inputSenha.focus();
    }

  } catch (erro) {

    console.error('ERRO COMPLETO:', erro);

    erroSenha.textContent = 'Erro ao conectar com o servidor.';
    erroSenha.classList.add('show');
  }
}

// botão
btnEntrar.addEventListener('click', fazerLogin);

// enter
inputSenha.addEventListener('keydown', (event) => {

  if (event.key === 'Enter') {
    fazerLogin();
  }

});
</script>
</body>
</html>
