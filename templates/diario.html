<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diário Seguro — Meu Escudo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root{
            --bg:#fff7f8;
            --bg-soft:#fff2f5;

            --wine:#6e3140;
            --wine-dark:#552431;

            --rose:#ff8fb1;
            --rose-soft:#ffe2ea;

            --gold:#d7a85f;

            --white:#ffffff;

            --glass:rgba(255,255,255,.75);

            --shadow:
                0 30px 80px rgba(110,49,64,.08);

            --shadow-soft:
                0 14px 40px rgba(110,49,64,.08);

            --border:
                rgba(255,255,255,.65);
        }

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        }

        body{

        min-height:100vh;

        padding:
        40px
        22px
        150px;

        font-family:'Inter',sans-serif;

        color:var(--wine);

        background:
        radial-gradient(
        circle at top,
        #fff,
        #fff8fa 40%,
        #fff1f4
        );

        overflow-x:hidden;

        }

        /* BG */

        body::before{

        content:'';

        position:fixed;

        top:-180px;
        right:-120px;

        width:520px;
        height:520px;

        background:
        radial-gradient(
        circle,
        rgba(255,143,177,.18),
        transparent 72%
        );

        pointer-events:none;

        z-index:-1;

        }

        /* HEADER */

        h2{

        font-family:
        'Playfair Display',
        serif;

        font-size:
        clamp(
        2rem,
        5vw,
        3rem
        );

        text-align:center;

        margin-bottom:26px;

        position:relative;

        }

        h2::after{

        content:'';

        display:block;

        width:90px;

        height:2px;

        margin:14px auto 0;

        background:
        linear-gradient(
        90deg,
        transparent,
        var(--rose),
        transparent
        );

        }

        /* CARD */

        .card{

        max-width:620px;

        margin:
        0 auto
        18px;

        padding:26px;

        border-radius:32px;

        background:var(--glass);

        backdrop-filter:
        blur(22px);

        border:
        1px solid
        var(--border);

        box-shadow:
        var(--shadow-soft);

        transition:.3s;

        }

        .card:hover{

        transform:
        translateY(-3px);

        }

        .card-title{

        font-family:
        'Playfair Display',
        serif;

        font-size:
        1.2rem;

        margin-bottom:18px;

        }

        /* TEXTAREA */

        textarea{

        width:100%;

        min-height:210px;

        padding:18px;

        resize:vertical;

        border-radius:22px;

        font-size:.95rem;

        font-family:'Inter';

        background:
        rgba(255,255,255,.65);

        border:
        1.5px solid
        rgba(217,139,147,.18);

        outline:none;

        color:var(--wine);

        transition:.25s;

        line-height:1.8;

        }

        textarea:focus{

        transform:
        translateY(-2px);

        box-shadow:
        0 12px 28px
        rgba(217,139,147,.14);

        border-color:
        var(--rose);

        }

        /* BOTÕES */

        .btn{

        width:100%;

        padding:16px;

        border:none;

        cursor:pointer;

        border-radius:20px;

        margin-top:16px;

        font-weight:700;

        font-size:.92rem;

        font-family:'Inter';

        background:
        linear-gradient(
        135deg,
        var(--wine),
        #9d4a5b
        );

        color:white;

        transition:.3s;

        }

        .btn:hover{

        transform:
        translateY(-3px);

        box-shadow:
        0 16px 35px
        rgba(125,52,65,.2);

        }

        .btn:disabled{

        opacity:.6;

        cursor:not-allowed;

        }

        /* ALERTAS */

        .msg{

        display:none;

        margin-top:16px;

        padding:14px;

        border-radius:18px;

        font-size:.88rem;

        }

        .msg.ok{

        display:block;

        background:#eefaf0;

        color:#2d7d42;

        }

        .msg.err{

        display:block;

        background:#fff0f0;

        color:#b11b1b;

        }

        /* DROPZONE */

        .drop-zone{

        padding:26px;

        border:

        2px dashed
        rgba(217,139,147,.25);

        border-radius:24px;

        background:

        linear-gradient(
        180deg,
        rgba(255,255,255,.65),
        rgba(255,245,247,.8)
        );

        text-align:center;

        transition:.25s;

        }

        .drop-zone:hover{

        border-color:
        var(--rose);

        transform:
        translateY(-2px);

        }

        .drop-zone strong{

        display:block;

        font-size:.88rem;

        opacity:.75;

        line-height:1.7;

        }

        /* ARQUIVOS */

        .file-list{

        list-style:none;

        margin-top:18px;

        }

        .file-item{

        display:flex;

        align-items:center;

        gap:14px;

        padding:14px;

        margin-bottom:10px;

        border-radius:18px;

        background:
        rgba(255,255,255,.6);

        }

        .file-item-icon{

        width:42px;
        height:42px;

        display:flex;

        align-items:center;

        justify-content:center;

        border-radius:14px;

        background:
        linear-gradient(
        135deg,
        #fff,
        var(--rose-soft)
        );

        }

        .file-item-info{

        flex:1;

        min-width:0;

        }

        .file-item-name{

        font-weight:700;

        overflow:hidden;

        white-space:nowrap;

        text-overflow:ellipsis;

        }

        .file-item-meta{

        font-size:.78rem;

        opacity:.5;

        }

        .btn-remove{

        background:none;

        border:none;

        color:var(--rose);

        cursor:pointer;

        font-size:.8rem;

        }

        /* HISTÓRICO */

        .entrada{

        padding:18px 0;

        border-bottom:

        1px solid
        rgba(217,139,147,.15);

        }

        .entrada:last-child{

        border:none;

        }

        .entrada small{

        opacity:.55;

        }

        .entrada p{

        margin-top:10px;

        line-height:1.8;

        background:
        rgba(255,255,255,.45);

        padding:14px;

        border-radius:16px;

        }

        .btn-apagar{

        margin-top:12px;

        background:none;

        border:none;

        cursor:pointer;

        color:var(--rose);

        font-size:.82rem;

        }

        /* NAV */

    .navbar{

position:sticky;

top:0;

z-index:500;

display:flex;

align-items:center;

justify-content:space-between;

padding:

18px 6%;

background:

rgba(255,255,255,.75);

backdrop-filter:

blur(18px);

border-bottom:

1px solid var(--border);

}


.logo{

display:flex;

align-items:center;

gap:14px;

text-decoration:none;

color:inherit;

}


.logo img{

height:46px;

}


.logo span{

font-family:
'Playfair Display';

font-size:
1.45rem;

color:
var(--wine);

}


.nav-actions{

display:flex;

gap:12px;

}


.nav-btn{

padding:

12px 18px;

border-radius:

999px;

background:

white;

text-decoration:none;

color:

var(--wine);

font-weight:
600;

border:

1px solid var(--border);

transition:
.25s;

}


.nav-btn:hover{

transform:
translateY(-2px);

}

        .bottom-nav{

        position:fixed;

        bottom:20px;

        left:50%;

        transform:
        translateX(-50%);

        width:90%;

        max-width:420px;

        padding:16px;

        display:flex;

        justify-content:space-around;

        border-radius:32px;

        background:
        rgba(255,255,255,.82);

        backdrop-filter:
        blur(22px);

        box-shadow:
        0 18px 50px rgba(0,0,0,.08);

        }

        .nav-item{

        font-size:1.45rem;

        text-decoration:none;

        transition:.3s;

        }

        .nav-item:hover{

        transform:
        translateY(-4px);

        }

        /* RESPONSIVO */

        @media(max-width:680px){

        body{

        padding:
        26px
        16px
        150px;

        }

        .card{

        padding:22px;

        border-radius:26px;

        }

        textarea{

        min-height:180px;

        }

        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">

<a
href="/"
class="logo">

<img
src="../static/imagens/logo.png">

<span>

Minha Maquiagem

</span>

</a>


<div class="nav-actions">

<a
href="/"
class="nav-btn">

Voltar

</a>

</div>

</header>

<h2>Meu Diário Seguro</h2>

<!-- ── Formulário de nova anotação ── -->
<div class="card">
    <h3 class="card-title">Nova anotação</h3>

    <textarea id="texto" placeholder="Escreva aqui o que sentir... Este espaço é só seu."></textarea>

    <!-- SEÇÃO DE ANEXOS -->
    <div class="anexo-label">
        <span>📎</span> Anexar documentos / provas
    </div>

    <div class="dropzone" id="dropzone">
        <input
            type="file"
            id="inputArquivos"
            multiple
            accept="image/*,.pdf,.doc,.docx,.txt,.mp4,.mov,.mp3,.ogg"
            onchange="adicionarArquivos(this.files)"
        />

        <span class="dropzone-hint">

            Fotos, PDFs, vídeos, áudios e documentos
        </span>
    </div>

    <div id="listaAnexos"></div>

    <button class="btn" onclick="salvar()">Salvar registro</button>
    <div id="msg" class="msg"></div>
</div>

<div class="card">
  <p class="card-title">Anexar documentos</p>

  <div class="drop-zone">
    <button class="btn" style="margin-bottom:8px;" onclick="document.getElementById('fileInput').click()">📎 Anexar arquivos</button>
        <strong>Clique para selecionar um arquivo: PDF, DOCX, imagens…</strong>
  </div>
  <input type="file" id="fileInput" style="display:none" multiple>

  <ul class="file-list" id="fileList" style="margin-top:10px"></ul>
</div>

<div class="card" id="cardEntradas" style="display:none;">
    <h3 class="card-title">Registros anteriores</h3>
    <div id="listaEntradas"></div>
</div>

<nav class="bottom-nav">
    <a href="/home-secret" class="nav-item">🏠</a>
    <a href="/localizacao" class="nav-item">📍</a>
    <a href="/contatos" class="nav-item">👥</a>
    <a href="/diario" class="nav-item">📝</a>
</nav>

<script>
const API = "/api/diario";
const files = [];

/* ===========================
   MENSAGENS
    }

    catch(err){

        console.error(err);

        exibirMsg(
            "err",
            "Erro ao carregar registros."
        );

    }

}

/* ===========================
   SALVAR
=========================== */

async function salvar(){

    const txt =
    document
    .getElementById("texto")
    .value
    .trim();

    if(!txt){

        exibirMsg(
            "err",
            "Escreva algo antes de salvar."
        );

        return;
    }

    const btn =
    document.querySelector(
        ".btn"
    );

    btn.disabled=true;
    btn.textContent="Salvando…";

    try{

        const res =
        await fetch(API,{
            method:"POST",
            credentials:"include",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                texto:txt
            })
        });

        // pega texto cru primeiro
        const body =
        await res.text();

        let dados={};

        try{
            dados =
            body
            ? JSON.parse(body)
            : {};
        }

        catch{

            console.error(
                "Resposta inválida:",
                body
            );

            throw new Error(
                "Servidor retornou resposta inválida."
            );

        }

        if(!res.ok){

            throw new Error(
                dados.message ||
                `Erro ${res.status}`
            );

        }

        document
        .getElementById(
            "texto"
        )
        .value="";

        exibirMsg(
            "ok",
            "Registro salvo!"
        );

        carregarEntradas();

    }

    catch(err){

        console.error(err);

        exibirMsg(
            "err",
            err.message
        );

    }

    finally{

        btn.disabled=false;

        btn.textContent=
        "Salvar registro";

    }

}

/* ===========================
   APAGAR
        }

        carregarEntradas();

    }

    catch{

        exibirMsg(
            "err",
            "Erro ao apagar."
        );

    }

}

/* ===========================
   RENDER
=========================== */

function renderEntradas(entradas){

    const card =
    document.getElementById(
        "cardEntradas"
    );

    const lista =
    document.getElementById(
        "listaEntradas"
    );

    if(!entradas.length){

        card.style.display=
        "none";

        return;

    }

    card.style.display=
    "block";

    lista.innerHTML =
    entradas.map(e=>`

<div class="entrada">

<small>
${formatarData(e.criado_em)}
</small>

<p>
${escaparHTML(e.texto)}
</p>

<button
class="btn-apagar"
onclick="apagarEntrada(${e.id})"
>

🗑 Apagar

</button>

</div>

`).join("");

}

/* ===========================
   ARQUIVOS
=========================== */

function fmtSize(b){

if(b<1024)
return b+" B";

if(b<1048576)
return (b/1024).toFixed(1)+" KB";

return (b/1048576).toFixed(1)+" MB";

}

function renderList(){

const ul =
document.getElementById(
"fileList"
);

ul.innerHTML="";

files.forEach((f,i)=>{

const li =
document.createElement(
"li"
);

li.className=
"file-item";

li.innerHTML=`

<div class="file-item-icon">
📄
</div>

<div class="file-item-info">

<div class="file-item-name">
${f.name}
</div>

<div class="file-item-meta">
${fmtSize(f.size)}
</div>

</div>

<button
class="btn-remove"
onclick="removeFile(${i})"
>

✕ remover

</button>

`;

ul.appendChild(li);

});

}

function removeFile(i){

files.splice(i,1);

renderList();

}

document
.getElementById(
"fileInput"
)
.addEventListener(
"change",
e=>{

files.push(
...e.target.files
);

renderList();

e.target.value="";

}
);

/* ===========================
   INICIAR
=========================== */

window.addEventListener(
"load",
carregarEntradas
);

</script>
</body>
</html>
