<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Diário</title>
    <style>
        body { background: #fff8f6; font-family: sans-serif; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; max-width: 500px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        textarea { width: 100%; height: 200px; border: 1px solid #ddd; border-radius: 10px; padding: 10px; box-sizing: border-box; }
        .btn { width: 100%; background: #7d3441; color: white; border: none; padding: 15px; margin-top: 10px; border-radius: 10px; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; padding: 15px; border-radius: 25px; display: flex; gap: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .nav-item { text-decoration: none; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Meu Diário Seguro</h2>
        <textarea id="texto" placeholder="Escreva aqui..."></textarea>
        <button class="btn" onclick="salvar()">Salvar Registro</button>
    </div>

    <nav class="bottom-nav">
        <a href="/home-secret" class="nav-item">🏠</a>
        <a href="/localizacao" class="nav-item">📍</a>
        <a href="/contatos" class="nav-item">👥</a>
        <a href="/diario" class="nav-item">📝</a>
    </nav>

    <script>
        async function salvar() {
            const txt = document.getElementById('texto').value;
            const res = await fetch('/api/diario', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({texto: txt})
            });
            if(res.ok) alert("Salvo com sucesso!");
        }
    </script>
</body>
</html>
