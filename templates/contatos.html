<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contatos de Emergência</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff8f6;
            --wine: #7d3441;
            --rose: #d98b93;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(125, 52, 65, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--wine);
            padding-bottom: 100px;
        }

        .header {
            padding: 30px 20px;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .contact-card {
            background: var(--white);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            border: 1px solid rgba(125, 52, 65, 0.05);
        }

        .contact-info h3 {
            margin: 0;
            font-size: 1rem;
        }

        .contact-info p {
            margin: 5px 0 0;
            font-size: 0.85rem;
            color: var(--rose);
            font-weight: 600;
        }

        .btn-call {
            text-decoration: none;
            background: #fdf0f0;
            padding: 10px;
            border-radius: 50%;
            font-size: 1.2rem;
        }

        .add-section {
            margin-top: 30px;
            text-align: center;
        }

        .btn-add {
            background: var(--wine);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 5px 15px rgba(125, 52, 65, 0.2);
        }

        /* Nav Inferior */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 15px;
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .nav-item {
            text-decoration: none;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Contatos de Confiança</h1>
        <p style="font-size: 0.9rem; opacity: 0.8;">Pessoas que serão alertadas em emergências</p>
    </div>

    <div class="container">
        <div class="contact-list" id="listaContatos">
            <div class="contact-card">
                <div class="contact-info">
                    <h3>Polícia</h3>
                    <p>190</p>
                </div>
                <a href="tel:190" class="btn-call">📞</a>
            </div>
        </div>

        <div class="add-section">
            <button class="btn-add" id="btnNovoContato">+ Adicionar Contato</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="/home-secret" class="nav-item">🏠</a>
        <a href="/localizacao" class="nav-item">📍</a>
        <a href="/contatos" class="nav-item">👥</a>
        <a href="/diario" class="nav-item">📝</a>
    </nav>

    <script>
        document.getElementById('btnNovoContato').addEventListener('click', () => {
            const nome = prompt("Nome do contato:");
            const tel = prompt("Telefone:");

            if (nome && tel) {
                const lista = document.getElementById('listaContatos');
                
                const novoCard = document.createElement('div');
                novoCard.className = 'contact-card';
                novoCard.innerHTML = `
                    <div class="contact-info">
                        <h3>${nome}</h3>
                        <p>${tel}</p>
                    </div>
                    <a href="tel:${tel}" class="btn-call">📞</a>
                `;
                
                lista.appendChild(novoCard);
            }
        });
    </script>
</body>
</html>
