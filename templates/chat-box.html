<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat de Maquiagem - Minha Maquiagem</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--rose:#ff7ea8;
--pink:#ffd7e5;
--cream:#fff8f8;
--wine:#5f3041;
--dark:#2b2528;
--white:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#fff6f9,#ffe6ef);
color:var(--dark);
min-height:100vh;
display:flex;
flex-direction:column;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
left:0;
width:100%;
z-index:999;
padding:18px 6%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,.78);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(0,0,0,.05);
}

.logo{
display:flex;
align-items:center;
gap:12px;
text-decoration:none;
}

.logo img{height:50px;}

.logo span{
font-family:'Playfair Display';
font-size:1.7rem;
color:var(--wine);
}

/* MENU */
.menu{
display:flex;
gap:30px;
position:relative;
}

.menu a{
text-decoration:none;
font-weight:600;
color:var(--dark);
cursor:pointer;
}

.menu a:hover{
color:var(--rose);
}

/* DROPDOWN */
.dropdown{
position:absolute;
top:45px;
left:0;
background:white;
border-radius:18px;
box-shadow:0 18px 40px rgba(0,0,0,.08);
padding:12px;
display:none;
flex-direction:column;
min-width:220px;
z-index:999;
}

.dropdown a{
padding:12px;
border-radius:12px;
text-decoration:none;
color:var(--dark);
font-weight:500;
}

.dropdown a:hover{
background:#fff2f6;
}


/* CHAT CONTAINER */
.chat-container{
flex:1;
padding:120px 6% 40px;
display:flex;
justify-content:center;
}

.chat-box{
width:100%;
max-width:900px;
background:white;
border-radius:30px;
box-shadow:0 20px 60px rgba(0,0,0,.08);
display:flex;
flex-direction:column;
overflow:hidden;
}

/* HEADER CHAT */
.chat-header{
padding:20px;
background:linear-gradient(135deg,var(--wine),#7a3f52);
color:white;
font-family:'Playfair Display';
font-size:1.4rem;
display:flex;
justify-content:space-between;
align-items:center;
}

.chat-header span{
font-size:.9rem;
opacity:.8;
}

/* MESSAGES */
.messages{
flex:1;
padding:25px;
height:420px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
background:#fff;
}

.msg{
max-width:75%;
padding:14px 16px;
border-radius:18px;
line-height:1.6;
font-size:.95rem;
}

.user{
align-self:flex-end;
background:var(--rose);
color:white;
border-bottom-right-radius:5px;
}

.bot{
align-self:flex-start;
background:#fff2f6;
color:var(--dark);
border-bottom-left-radius:5px;
}

/* INPUT AREA */
.input-area{
display:flex;
padding:18px;
border-top:1px solid #eee;
gap:10px;
background:#fff;
}

.input-area input{
flex:1;
padding:14px 16px;
border-radius:999px;
border:1px solid #eee;
outline:none;
font-size:1rem;
}

.input-area button{
padding:14px 22px;
border:none;
border-radius:999px;
background:var(--wine);
color:white;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.input-area button:hover{
transform:translateY(-2px);
background:#6d3648;
}

.typing{
font-size:.85rem;
color:#888;
padding:0 25px 10px;
}

</style>

</head>

<body>

<header class="navbar">

<a href="/" class="logo">
<img src="../static/imagens/logo.png">
<span>Minha Maquiagem</span>
</a>

<nav class="menu">

<a href="/">Início</a>

<a onclick="toggleMenu()">Ferramentas ▾</a>

<div class="dropdown" id="menuTools">
    <a href="/tom-de-pele">Descobrir meu Tom</a>
    <a href="/inspiracoes">Inspirações</a>
    <a href="/quizmake">Descubra seu estilo</a>
</div>

<a href="/login">Perfil</a>

</nav>

</header>

<div class="chat-container">

<div class="chat-box">

<div class="chat-header">
Chat de Beleza IA
<span>Seu assistente de maquiagem</span>
</div>

<div class="messages" id="messages">

<div class="msg bot">
Oi 💖 Me pergunte qualquer coisa sobre maquiagem, tons ou estilos!
</div>

</div>

<div class="typing" id="typing" style="display:none;">
IA digitando...
</div>

<div class="input-area">

<input type="text" id="input" placeholder="Ex: qual base combina comigo?">

<button onclick="sendMessage()">Enviar</button>

</div>

</div>

</div>

<script>

const messages = document.getElementById("messages");
const input = document.getElementById("input");
const typing = document.getElementById("typing");

function addMessage(text, type){
const div = document.createElement("div");
div.classList.add("msg", type);
div.innerText = text;
messages.appendChild(div);
messages.scrollTop = messages.scrollHeight;
}

async function sendMessage(){

const text = input.value.trim();
if(!text) return;

addMessage(text, "user");
input.value = "";

typing.style.display = "block";

try{
const res = await fetch("/api/ia/chat", {
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

const data = await res.json();

typing.style.display = "none";

addMessage(data.response || "Erro ao responder 😢", "bot");

}catch(err){
typing.style.display = "none";
addMessage("Erro na conexão com a IA 😢", "bot");
}

}

input.addEventListener("keypress", (e)=>{
if(e.key === "Enter") sendMessage();
});

</script>

</body>
</html>
